<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#FF6B8A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DailyDraw">
<link rel="manifest" href="manifest.json">
<title>DailyDraw with Penne</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FFF3EC;--bg2:#FFE8D8;--card:#FFFFFF;
  --rose:#FF6B8A;--salmon:#FFACA8;--peach:#FFDBBA;
  --teal:#5CC4C4;--purple:#C387C2;--blue:#5EA8E6;--slate:#88AED2;
  --txt:#3A1A08;--txt2:#8A5A3A;--txt3:#C09070;
  --bdr:rgba(180,100,50,0.12);--bdr2:rgba(180,90,40,0.22);
  --radius:14px;--radius-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--txt)}
body{display:flex;flex-direction:column}
.app-header{flex-shrink:0;padding:calc(var(--safe-top) + 12px) 18px 11px;background:var(--bg);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.header-left .h-title{font-size:17px;font-weight:700;letter-spacing:-.01em}
.header-left .h-sub{font-size:10px;color:var(--txt3);margin-top:1px}
.header-right .h-pct{font-size:17px;font-weight:800;color:var(--rose);line-height:1}
.header-right .h-lbl{font-size:9px;color:var(--txt3)}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scroll-area::-webkit-scrollbar{width:3px}
.scroll-area::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.scroll-inner{padding:14px 16px calc(var(--safe-bottom) + 76px)}
.bottom-nav{flex-shrink:0;display:flex;background:var(--card);border-top:1px solid var(--bdr);padding-bottom:var(--safe-bottom)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 6px;font-size:10px;color:var(--txt3);cursor:pointer;transition:color .15s;border:none;background:none;font-family:inherit}
.bn.on{color:var(--rose)}
.bn .icon{width:20px;height:20px}
.sec-hd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txt3);margin:14px 0 8px;display:flex;align-items:center;gap:6px}
.sec-hd::after{content:'';flex:1;height:1px;background:var(--bdr)}
.streak-band{background:var(--rose);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;display:flex;align-items:flex-end;gap:12px;overflow:hidden;min-height:88px}
.sb-left{flex:1}
.sb-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,0.7);margin-bottom:3px}
.sb-num{font-size:32px;font-weight:800;color:#fff;line-height:1}
.fire{font-size:24px}
.sb-sub{font-size:10px;color:rgba(255,255,255,0.75);margin-top:3px}
.sb-penne{width:88px;height:88px;object-fit:contain;margin-bottom:-14px;margin-right:-6px;flex-shrink:0}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--radius-sm);padding:10px 12px}
.sv{font-size:22px;font-weight:800;line-height:1;margin-bottom:3px}
.sl{font-size:9px;color:var(--txt3)}
.btn-primary{width:100%;padding:14px;background:var(--rose);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:10px;font-family:inherit;transition:opacity .15s}
.btn-primary:active{opacity:.85}
.btn-secondary{flex:1;padding:12px;background:var(--card);color:var(--txt2);border:1.5px solid var(--bdr2);border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit}
.btn-secondary:active{background:var(--bg2)}
.btn-ghost{width:100%;padding:10px;background:transparent;color:var(--txt3);border:1px solid var(--bdr);border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-ghost:active{background:var(--bg2)}
.nudge-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius);padding:10px 12px;display:flex;align-items:center;gap:10px}
.nudge-penne{width:48px;height:48px;object-fit:contain;flex-shrink:0}
.nudge-title{font-size:9px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.nudge-body{font-size:11px;color:var(--txt2)}
.nudge-warn{font-size:11px;color:var(--salmon);font-weight:600;margin-top:3px}
.nudge-good{font-size:11px;color:#3AACAC;font-weight:600;margin-top:3px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.cat-tile{background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--radius);padding:12px 10px;text-align:center;cursor:pointer;transition:all .15s}
.cat-tile:active{transform:scale(0.97)}
.cat-name{font-size:11px;font-weight:700;color:var(--txt);margin:5px 0 2px}
.cat-count{font-size:9px;color:var(--txt3)}
.icon{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.icon svg{width:100%;height:100%}
.time-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--bdr2);font-size:11px;font-weight:600;color:var(--txt2);background:var(--card);cursor:pointer;transition:all .15s}
.chip.on{background:var(--rose);color:#fff;border-color:var(--rose)}
.slider-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.s-edge{font-size:9px;color:var(--txt3)}
.s-val{font-size:12px;font-weight:700;color:var(--rose);min-width:38px;text-align:center}
input[type=range]{height:4px;border-radius:2px}
.subject-card{border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;text-align:center}
.subj-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,0.75);margin-bottom:5px}
.subj-name{font-size:22px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:4px}
.subj-cat{font-size:10px;color:rgba(255,255,255,0.8)}
.session-mid{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.session-penne{width:80px;height:80px;object-fit:contain;flex-shrink:0}
.timer-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.timer-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-num{font-size:26px;font-weight:800;line-height:1}
.timer-sub{font-size:9px;color:var(--txt3);margin-top:2px}
.count-row{display:flex;gap:8px;margin-bottom:10px}
.count-card{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:var(--radius-sm);padding:8px;text-align:center}
.cv{font-size:18px;font-weight:800;line-height:1;margin-bottom:2px}
.cl{font-size:8px;color:var(--txt3)}
.session-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}
.end-screen{text-align:center;padding:6px 0}
.end-penne{width:110px;height:110px;object-fit:contain;margin:0 auto 8px;display:block}
.end-title{font-size:18px;font-weight:800;color:var(--txt);margin-bottom:4px}
.end-sub{font-size:11px;color:var(--txt3);margin-bottom:10px}
.streak-badge{display:inline-flex;align-items:center;gap:5px;padding:6px 16px;background:var(--rose);color:#fff;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:12px}
.end-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.end-stat{border-radius:var(--radius-sm);padding:10px 8px;border:1px solid var(--bdr)}
.esv{font-size:16px;font-weight:800;line-height:1;margin-bottom:3px}
.esl{font-size:8px;color:var(--txt3)}
.drew-section{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px;text-align:left}
.drew-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:6px}
.drew-chips{display:flex;flex-wrap:wrap;gap:5px}
.drew-chip{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:4px 10px;font-size:10px;color:var(--txt2)}
.drew-more{color:var(--txt3)}
.history-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--radius-sm);margin-bottom:6px}
.h-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.h-name{font-size:12px;color:var(--txt);flex:1}
.h-cat{font-size:9px;color:var(--txt3)}
.h-status{font-size:9px;color:var(--txt3)}
.h-done{color:#3AACAC}
.cat-stat-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.cat-bar-wrap{flex:1;height:5px;background:var(--bdr2);border-radius:3px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:3px;transition:width .4s}
</style>
</head>

// ── STATE ──
const STATE_KEY = 'dd_v1';
let state = {
  streak:0, lastActiveDate:null, bestStreak:0,
  totalDrawn:0, todayDrawn:0, lastTodayDate:null,
  history:[], view:'home', session:null,
};

function todayStr() {
  const d=new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function loadState() {
  try { const s=localStorage.getItem(STATE_KEY); if(s) Object.assign(state,JSON.parse(s)); } catch(e){}
  if(state.lastTodayDate!==todayStr()) { state.todayDrawn=0; state.lastTodayDate=todayStr(); }
  if(state.lastActiveDate && state.lastActiveDate!==todayStr()) {
    const diff=Math.round((new Date()-new Date(state.lastActiveDate.replace(/-/g,'/')))/86400000);
    if(diff>1) state.streak=0;
  }
}

function saveState() {
  try { localStorage.setItem(STATE_KEY,JSON.stringify(state)); } catch(e){}
}

function updateStreak() {
  if(state.todayDrawn<3) return;
  const today=todayStr();
  if(state.lastActiveDate===today) return;
  if(!state.lastActiveDate) { state.streak=1; }
  else {
    const diff=Math.round((new Date()-new Date(state.lastActiveDate.replace(/-/g,'/')))/86400000);
    state.streak = diff===1 ? state.streak+1 : 1;
  }
  if(state.streak>state.bestStreak) state.bestStreak=state.streak;
  state.lastActiveDate=today;
  saveState();
}

// ── TIMER ──
let timerInterval=null;

function startTimer() {
  const s=state.session;
  if(!s||s.done) return;
  s.running=true;
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(!state.session||state.session.done){clearInterval(timerInterval);return;}
    state.session.remaining--;
    if(state.session.remaining<=0){
      state.session.remaining=0;
      clearInterval(timerInterval);
      state.session.running=false;
      if(navigator.vibrate) navigator.vibrate([150,80,150]);
      renderSession(); return;
    }
    updateTimerDisplay();
  },1000);
  renderSession();
}

function pauseTimer() { clearInterval(timerInterval); state.session.running=false; renderSession(); }

function updateTimerDisplay() {
  const s=state.session; if(!s) return;
  const m=Math.floor(s.remaining/60), sec=s.remaining%60;
  const el=document.getElementById('timerDisplay');
  if(el) el.textContent=m>0?`${m}:${String(sec).padStart(2,'0')}`:`0:${String(sec).padStart(2,'0')}`;
  const ring=document.getElementById('timerRing');
  if(ring) { const circ=2*Math.PI*38; ring.style.strokeDashoffset=circ*(1-s.remaining/s.secs); }
  const wrap=document.getElementById('timerWrap');
  if(wrap) wrap.style.color=s.remaining<=10?'#FF6B8A':'var(--txt)';
}

// ── SESSION ──
function startSession(catId,secs) {
  clearInterval(timerInterval);
  const pool=OBJECTS[catId];
  state.session={catId,secs,remaining:secs,current:pickRandom(pool,null),sessionDrawn:0,log:[],running:false,done:false};
  saveState(); showView('session');
}

function pickRandom(pool,exclude) {
  let item;
  do { item=pool[Math.floor(Math.random()*pool.length)]; }
  while(pool.length>1&&exclude&&item.n===exclude);
  return item;
}

function markDone() {
  const s=state.session; if(!s||s.done) return;
  const obj=s.current;
  s.log.push({name:obj.n,cat:obj.c,skipped:false});
  s.sessionDrawn++; state.todayDrawn++; state.totalDrawn++;
  state.history.unshift({name:obj.n,cat:obj.c,skipped:false,ts:Date.now()});
  if(state.history.length>50) state.history.pop();
  updateStreak();
  s.current=pickRandom(OBJECTS[s.catId],obj.n);
  s.remaining=s.secs;
  clearInterval(timerInterval); s.running=false;
  saveState(); renderSession(); startTimer();
}

function skipObject() {
  const s=state.session; if(!s||s.done) return;
  const obj=s.current;
  s.log.push({name:obj.n,cat:obj.c,skipped:true});
  state.history.unshift({name:obj.n,cat:obj.c,skipped:true,ts:Date.now()});
  if(state.history.length>50) state.history.pop();
  s.current=pickRandom(OBJECTS[s.catId],obj.n);
  s.remaining=s.secs;
  clearInterval(timerInterval); s.running=false;
  saveState(); renderSession(); startTimer();
}

function endSession() {
  clearInterval(timerInterval);
  if(!state.session) return;
  state.session.done=true;
  saveState(); showView('end');
}

// ── VIEWS ──
function showView(v) {
  if(v!=='session'&&v!=='end') { clearInterval(timerInterval); if(v!=='practice') state.session=null; }
  state.view=v; render(); window.scrollTo(0,0);
}

function formatTime(secs) {
  return secs<60?`${secs}s`:secs<3600?`${Math.round(secs/60)} min`:`${Math.round(secs/3600)}h`;
}

function render() {
  const v=state.view;
  const titles={home:'DailyDraw',practice:'Practice',stats:'Progress',setup:'New session',session:'Drawing now',end:'Session done!'};
  document.getElementById('headerTitle').textContent=titles[v]||'DailyDraw';
  const cat=state.session?CATS.find(c=>c.id===state.session.catId):null;
  document.getElementById('headerSub').textContent=
    v==='home'?'with Penne ✏':
    v==='stats'?`${state.totalDrawn} objects drawn`:
    v==='setup'?'pick category + time':
    v==='session'?`${cat?.label||''} · ${state.session?formatTime(state.session.secs):''}`:
    v==='end'?'great work today!':'';
  document.getElementById('headerStreak').textContent=state.streak;
  const main=document.getElementById('mainContent');
  if(v==='session') { renderSession(); }
  else if(v==='home') main.innerHTML=renderHome();
  else if(v==='practice') main.innerHTML=renderPractice();
  else if(v==='stats') main.innerHTML=renderStats();
  else if(v==='end') main.innerHTML=renderEnd();
  document.querySelectorAll('.bn').forEach(el=>{
    const bv=el.dataset.view;
    el.classList.toggle('on',
      bv===v || (bv==='practice'&&(v==='setup'||v==='session'||v==='end'))
    );
  });
}

function selectCat(id){setupCat=id;render();}
function selectTime(s){setupSecs=s;render();}
function sliderChange(v){
  setupSecs=Math.round(30*Math.pow(7200/30,v/100));
  setupSecs=Math.max(30,Math.min(3600,setupSecs));
  const el=document.querySelector('.s-val');
  if(el) el.textContent=formatTime(setupSecs);
}
function openCustomTime(){
  const val=prompt('Enter time in seconds (30–3600):');
  const n=parseInt(val);
  if(n>=30&&n<=3600){setupSecs=n;render();}
}

      </div>`).join('')
  }
  <div class="sec-hd" style="margin-top:14px">by category</div>
  ${CATS.map(c=>{
    const n=state.history.filter(h=>!h.skipped&&OBJECTS[c.id]?.some(o=>o.n===h.name)).length;
    const pct=state.totalDrawn>0?Math.round((n/state.totalDrawn)*100):0;
    return `<div class="cat-stat-row">
      <span class="icon" style="width:16px;height:16px;color:${c.color};flex-shrink:0">${ICONS[c.icon]}</span>
      <div style="font-size:11px;font-weight:600;color:var(--txt2);width:56px;flex-shrink:0">${c.label}</div>
      <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${pct}%;background:${c.color}"></div></div>
      <div style="font-size:10px;color:var(--txt3);width:24px;text-align:right;flex-shrink:0">${n}</div>
    </div>`;
  }).join('')}`;
}

// ── INIT ──
loadState();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
render();

</script>
</body>
</html>
