<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#FF8894">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DailyDraw">
<link rel="manifest" href="manifest.json">
<title>DailyDraw with Penne</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#FFF5EE;
  --bg2:#FFE8D8;
  --bg3:#FFD8C0;
  --card:#FFFFFF;
  --card2:#FFF0E8;
  --accent:#FF8894;
  --accent2:#FFACA8;
  --accent-dim:rgba(255,136,148,0.12);
  --text:#3D2010;
  --text2:#7A4A2A;
  --text3:#B08060;
  --border:rgba(255,120,80,0.13);
  --border2:rgba(255,100,60,0.25);
  --peach:#FFDBBA;
  --salmon:#FFACA8;
  --rose:#FF8894;
  --mint:#A1E0DD;
  --teal:#5CC2C6;
  --slate:#88AED2;
  --lilac:#F7DFF6;
  --purple:#C387C2;
  --sky:#A4E9FF;
  --blue:#5EA8E6;
  --sage:#D4F1D8;
  --radius:14px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
}

/* ── HEADER ── */
.app-header{
  flex-shrink:0;
  padding:calc(var(--safe-top) + 14px) 20px 13px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.ah-left .ah-title{
  font-family:'Syne',sans-serif;
  font-size:18px;font-weight:800;
  letter-spacing:-.02em;color:var(--text);
}
.ah-left .ah-sub{font-size:11px;color:var(--text3);margin-top:2px}
.ah-right{text-align:right}
.ah-right .ah-num{
  font-family:'Syne',sans-serif;
  font-size:20px;font-weight:800;color:var(--accent);line-height:1;
}
.ah-right .ah-lbl{font-size:10px;color:var(--text3);margin-top:1px}

/* ── SCROLL ── */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scroll-area::-webkit-scrollbar{width:3px}
.scroll-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.scroll-inner{padding:18px 16px calc(var(--safe-bottom) + 84px)}

/* ── BOTTOM NAV ── */
.bottom-nav{
  flex-shrink:0;display:flex;
  background:var(--bg);
  border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
}
.bn-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 8px;gap:4px;
  font-size:10px;font-weight:500;color:var(--text3);
  cursor:pointer;transition:color .15s;
  border:none;background:none;font-family:'DM Sans',sans-serif;
}
.bn-item.active{color:var(--accent)}
.bn-icon{font-size:22px;line-height:1}

/* ── SECTION HEADER ── */
.sec-hd{
  font-family:'Syne',sans-serif;
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;
  color:var(--text3);
  margin:20px 0 10px;
  display:flex;align-items:center;gap:8px;
}
.sec-hd::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── STREAK BAND ── */
.streak-band{
  background:var(--rose);
  border-radius:var(--radius);
  padding:20px 0 0 20px;
  margin-bottom:16px;
  display:flex;align-items:flex-end;
  overflow:hidden;
  position:relative;
  min-height:110px;
}
.streak-band::before{
  content:'';position:absolute;right:-24px;top:-24px;
  width:130px;height:130px;border-radius:50%;
  background:rgba(255,255,255,0.07);
}
.sb-left{flex:1;padding-bottom:20px}
.sb-eyebrow{
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.1em;color:rgba(255,255,255,0.65);margin-bottom:5px;
}
.sb-num{
  font-family:'Syne',sans-serif;
  font-size:48px;font-weight:800;color:#fff;line-height:1;
}
.sb-fire{font-size:38px;vertical-align:middle;margin-left:6px}
.sb-sub{font-size:12px;color:rgba(255,255,255,0.75);margin-top:5px}
.sb-penne{
  width:110px;height:110px;
  object-fit:contain;
  object-position:bottom;
  flex-shrink:0;
  align-self:flex-end;
  margin-right:0;
}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px 14px 13px;
}
.stat-val{
  font-family:'Syne',sans-serif;
  font-size:30px;font-weight:800;line-height:1;margin-bottom:4px;
}
.stat-lbl{font-size:11px;color:var(--text3)}

/* ── PRIMARY BUTTON ── */
.btn-primary{
  width:100%;padding:16px;
  background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;
  font-size:16px;font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:12px;
  transition:opacity .15s;
}
.btn-primary:active{opacity:.88}

/* ── SECONDARY BUTTON ── */
.btn-secondary{
  flex:1;padding:15px;
  background:var(--card);color:var(--text2);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .15s;
}
.btn-secondary:active{background:var(--bg2)}

/* ── GHOST BUTTON ── */
.btn-ghost{
  width:100%;padding:13px;
  background:transparent;color:var(--text3);
  border:1px solid var(--border);
  border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;
  cursor:pointer;
  transition:background .15s;
}
.btn-ghost:active{background:var(--bg2)}

/* ── NUDGE CARD ── */
.nudge-card{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px 16px;
  display:flex;align-items:center;gap:14px;
  margin-top:4px;
}
.nudge-penne{width:60px;height:60px;object-fit:contain;flex-shrink:0}
.nudge-eyebrow{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.nudge-body{font-size:13px;color:var(--text2);line-height:1.4}
.nudge-warn{font-size:13px;color:var(--accent);font-weight:500;margin-top:3px}
.nudge-ok{font-size:13px;color:var(--teal);font-weight:500;margin-top:3px}

/* ── CATEGORY GRID ── */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.cat-tile{
  background:var(--card);
  border:1.5px solid var(--border2);
  border-radius:var(--radius);
  padding:18px 12px 14px;
  text-align:center;cursor:pointer;
  transition:all .2s;
}
.cat-tile:active{transform:scale(0.97)}
.cat-tile.sel{background:var(--card2)}
.cat-tile svg{width:28px;height:28px;stroke-width:1.6;margin-bottom:8px}
.ct-name{
  font-family:'Syne',sans-serif;
  font-size:14px;font-weight:700;
  color:var(--text);margin-bottom:3px;
}
.ct-count{font-size:10px;color:var(--text3)}

/* ── TIME CHIPS ── */
.time-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.tc{
  padding:9px 15px;
  border-radius:20px;
  border:1px solid var(--border2);
  font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;
  color:var(--text2);background:var(--card);
  cursor:pointer;transition:all .15s;
}
.tc.on{
  background:var(--accent);color:#fff;
  border-color:var(--accent);
}

/* ── SUBJECT CARD ── */
.subject-card{
  border-radius:var(--radius);
  padding:20px 18px;margin-bottom:14px;
  text-align:center;position:relative;overflow:hidden;
}
.subject-card::before{
  content:'';position:absolute;right:-20px;top:-20px;
  width:100px;height:100px;border-radius:50%;
  background:rgba(255,255,255,0.07);
}
.sc-eyebrow{
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.1em;color:rgba(255,255,255,0.65);margin-bottom:6px;
}
.sc-name{
  font-family:'Syne',sans-serif;
  font-size:26px;font-weight:800;color:#fff;
  line-height:1.2;margin-bottom:8px;
}
.sc-cat{
  font-size:11px;color:rgba(255,255,255,0.85);
  background:rgba(255,255,255,0.18);
  display:inline-block;padding:4px 12px;border-radius:20px;
}

/* ── SESSION MID ── */
.sess-mid{
  display:flex;align-items:center;gap:14px;
  margin-bottom:14px;
}
.sess-penne{width:88px;height:88px;object-fit:contain;flex-shrink:0}
.timer-box{
  flex:1;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  min-height:88px;
}
.timer-wrap{position:relative;width:88px;height:88px}
.timer-center{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.timer-num{
  font-family:'Syne',sans-serif;
  font-size:22px;font-weight:800;line-height:1;
  color:var(--text);
}
.timer-sub{font-size:10px;color:var(--text3);margin-top:3px}

/* ── COUNT ROW ── */
.count-row{display:flex;gap:10px;margin-bottom:14px}
.count-card{
  flex:1;background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:12px 8px 10px;
  text-align:center;
}
.cv{
  font-family:'Syne',sans-serif;
  font-size:24px;font-weight:800;line-height:1;margin-bottom:3px;
}
.cl{font-size:10px;color:var(--text3)}

/* ── SESSION BTNS ── */
.sess-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}

/* ── END SCREEN ── */
.end-screen{text-align:center;padding:8px 0}
.end-penne{width:120px;height:120px;object-fit:contain;margin:0 auto 10px;display:block}
.end-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:5px}
.end-sub{font-size:13px;color:var(--text3);margin-bottom:14px}
.streak-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 20px;
  background:var(--accent);color:#fff;
  border-radius:20px;font-size:13px;font-weight:600;
  margin-bottom:16px;
}
.end-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.end-stat{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:12px 8px;
}
.esv{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1;margin-bottom:3px}
.esl{font-size:9px;color:var(--text3)}
.drew-box{
  background:var(--card2);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  margin-bottom:14px;text-align:left;
}
.drew-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px}
.drew-chips{display:flex;flex-wrap:wrap;gap:6px}
.dc{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:5px 12px;
  font-size:12px;color:var(--text2);
}

/* ── HISTORY ── */
.hist-row{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:8px;
}
.hist-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hist-name{font-size:13px;color:var(--text);flex:1;font-weight:400}
.hist-cat{font-size:10px;color:var(--text3)}
.hist-st{font-size:10px;color:var(--text3)}
.hist-st.ok{color:var(--teal);font-weight:500}

/* ── CAT PROGRESS BARS ── */
.cat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cat-bar-icon{width:18px;height:18px;flex-shrink:0}
.cat-bar-lbl{font-size:12px;font-weight:500;color:var(--text2);width:60px;flex-shrink:0}
.cat-bar-track{flex:1;height:5px;background:var(--border2);border-radius:3px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.cat-bar-n{font-size:11px;color:var(--text3);width:26px;text-align:right;flex-shrink:0}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease forwards}
@keyframes popIn{0%{transform:scale(0.88);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
.pop-in{animation:popIn .22s ease forwards}
</style>
</head>

   svg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="1"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01M12 6h.01M16 6h.01M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14h.01"/></svg>'},
  {id:'food',label:'Food',color:'#FFACA8',bg:'rgba(255,172,168,0.1)',pill:'#FFACA8',ptxt:'#8C2A1A',

   svg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L4.09 12.97A1 1 0 005 14.5h6L9 22l9.91-10.97A1 1 0 0018 9.5h-6z"/></svg>'},
];

const TIMES=[
  {l:'30s',s:30},{l:'1 min',s:60},{l:'2 min',s:120},
  {l:'5 min',s:300},{l:'10 min',s:600},{l:'15 min',s:900},{l:'30 min',s:1800},
];

// ── STATE ──
const SK='ddv3';
let ST={
  streak:0,lastActive:null,best:0,
  totalSketched:0,todaySketched:0,todayDate:null,
  sessionDays:0,lastSessionDay:null,
  history:[],view:'home',session:null,
};

function today(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}

function load(){
  try{const s=localStorage.getItem(SK);if(s)Object.assign(ST,JSON.parse(s));}catch(e){}
  if(ST.todayDate!==today()){ST.todaySketched=0;ST.todayDate=today();}
  if(ST.lastActive&&ST.lastActive!==today()){
    const diff=Math.round((new Date()-new Date(ST.lastActive.replace(/-/g,'/')))/86400000);
    if(diff>1)ST.streak=0;
  }
}
function save(){try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}}

function checkStreak(){
  if(ST.todaySketched<3)return;
  if(ST.lastActive===today())return;
  if(!ST.lastActive){ST.streak=1;}
  else{
    const diff=Math.round((new Date()-new Date(ST.lastActive.replace(/-/g,'/')))/86400000);
    ST.streak=diff===1?ST.streak+1:1;
  }
  if(ST.streak>ST.best)ST.best=ST.streak;
  ST.lastActive=today();save();
}

// ── TIMER ──
let TI=null;

function startTimer(){
  const s=ST.session;if(!s||s.done)return;
  s.running=true;clearInterval(TI);
  TI=setInterval(()=>{
    if(!ST.session||ST.session.done){clearInterval(TI);return;}
    ST.session.remaining--;
    if(ST.session.remaining<=0){
      ST.session.remaining=0;clearInterval(TI);ST.session.running=false;
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
      renderSession();return;
    }
    updateTimer();
  },1000);
  renderSession();
}
function pauseTimer(){clearInterval(TI);ST.session.running=false;renderSession();}

function updateTimer(){
  const s=ST.session;if(!s)return;
  const m=Math.floor(s.remaining/60),sec=s.remaining%60;
  const el=document.getElementById('tD');
  if(el)el.textContent=`${m}:${String(sec).padStart(2,'0')}`;
  const ring=document.getElementById('tR');
  if(ring){const c=2*Math.PI*36;ring.style.strokeDashoffset=(c*(1-s.remaining/s.secs)).toFixed(1);}
  const tw=document.getElementById('tN');
  if(tw)tw.style.color=s.remaining<=10&&s.remaining>0?'#FF8894':'var(--text)';
}

// ── SESSION ──
function startSession(catId,secs){
  clearInterval(TI);
  ST.session={catId,secs,remaining:secs,current:pick(catId,null),sketched:0,log:[],running:false,done:false};
  save();go('session');
}
function pick(catId,excl){
  const pool=OBJ[catId];let item;
  do{item=pool[Math.floor(Math.random()*pool.length)];}
  while(pool.length>1&&excl&&item.n===excl);
  return item;
}
function markSketched(){
  const s=ST.session;if(!s||s.done)return;
  const obj=s.current;
  s.log.push({name:obj.n,cat:obj.c,skip:false});
  s.sketched++;ST.totalSketched++;ST.todaySketched++;
  ST.history.unshift({name:obj.n,cat:obj.c,skip:false,ts:Date.now()});
  if(ST.history.length>50)ST.history.pop();
  checkStreak();
  s.current=pick(s.catId,obj.n);
  s.remaining=s.secs;clearInterval(TI);s.running=false;
  save();renderSession();startTimer();
}
function skipObj(){
  const s=ST.session;if(!s||s.done)return;
  const obj=s.current;
  s.log.push({name:obj.n,cat:obj.c,skip:true});
  ST.history.unshift({name:obj.n,cat:obj.c,skip:true,ts:Date.now()});
  if(ST.history.length>50)ST.history.pop();
  s.current=pick(s.catId,obj.n);
  s.remaining=s.secs;clearInterval(TI);s.running=false;
  save();renderSession();startTimer();
}
function endSession(){
  clearInterval(TI);if(!ST.session)return;
  ST.session.done=true;
  if(!ST.lastSessionDay||ST.lastSessionDay!==today()){ST.sessionDays++;ST.lastSessionDay=today();}
  save();go('end');
}

// ── NAV ──
let setupCat='objects',setupSecs=120;
function go(v){
  if(v!=='session'&&v!=='end'){clearInterval(TI);if(v==='home'||v==='stats')ST.session=null;}
  ST.view=v;render();
  document.querySelector('.scroll-area')?.scrollTo(0,0);
}
function fmt(s){return s<60?`${s}s`:s<3600?`${Math.round(s/60)}m`:`${Math.round(s/3600)}h`;}

// ── RENDER ──
function render(){
  const v=ST.view;
  const titles={home:'DailyDraw',practice:'Practice',stats:'Progress',session:'Drawing now',end:'Session done!'};
  const subs={
    home:'with Penne ✏',practice:'pick category + time',
    stats:`${ST.totalSketched} objects sketched`,
    session:ST.session?`${CATS.find(c=>c.id===ST.session.catId)?.label} · ${fmt(ST.session.secs)}`:'',
    end:'great work!',
  };
  document.getElementById('ahTitle').textContent=titles[v]||'DailyDraw';
  document.getElementById('ahSub').textContent=subs[v]||'';
  document.getElementById('ahStreak').textContent=ST.streak;
  ['Home','Practice','Stats'].forEach(n=>{
    const el=document.getElementById('bn'+n);
    if(el)el.classList.toggle('active',
      (n==='Home'&&v==='home')||(n==='Practice'&&(v==='practice'||v==='session'||v==='end'))||(n==='Stats'&&v==='stats'));
  });
  const mc=document.getElementById('mainContent');
  if(v==='session')renderSession();
  else if(v==='home')mc.innerHTML=renderHome();
  else if(v==='practice')mc.innerHTML=renderPractice();
  else if(v==='stats')mc.innerHTML=renderStats();
  else if(v==='end')mc.innerHTML=renderEnd();
}

// ── HOME ──
function renderHome(){
  const kept=ST.todaySketched>=3;
  return `
  <div class="streak-band">
    <div class="sb-left">
      <div class="sb-eyebrow">current streak</div>
      <div class="sb-num">${ST.streak}<span class="sb-fire">🔥</span></div>
      <div class="sb-sub">day streak</div>
    </div>
    <img src="${P.wave}" class="sb-penne" alt="Penne"/>
  </div>

  <div class="sec-hd">Your stats</div>
  <div class="stat-grid">
    <div class="stat-card" style="background:#FFF0F3;border-color:rgba(255,136,148,0.18)">
      <div class="stat-val" style="color:#FF8894">${ST.totalSketched}</div>
      <div class="stat-lbl">total sketched</div>
    </div>
    <div class="stat-card" style="background:#EDF7F7;border-color:rgba(92,194,198,0.18)">
      <div class="stat-val" style="color:#3AACAC">${ST.todaySketched}</div>
      <div class="stat-lbl">today</div>
    </div>
    <div class="stat-card" style="background:#F8EFF8;border-color:rgba(195,135,194,0.18)">
      <div class="stat-val" style="color:#C387C2">${ST.best}</div>
      <div class="stat-lbl">best streak</div>
    </div>
    <div class="stat-card" style="background:#EDF4FC;border-color:rgba(94,168,230,0.18)">
      <div class="stat-val" style="color:#5EA8E6">${ST.sessionDays}</div>
      <div class="stat-lbl">days practiced</div>
    </div>
  </div>

  <button class="btn-primary" onclick="go('practice')">Start practicing</button>

  <div class="nudge-card">
    <img src="${P.shy}" class="nudge-penne" alt="Penne shy"/>
    <div>
      <div class="nudge-eyebrow">to keep your streak</div>
      <div class="nudge-body">Sketch at least 3 objects today</div>
      ${kept
        ?`<div class="nudge-ok">✓ Streak safe today!</div>`
        :`<div class="nudge-warn">${ST.todaySketched} sketched · ${3-ST.todaySketched} more to go</div>`
      }
    </div>
  </div>`;
}

// ── PRACTICE ──
function renderPractice(){
  return `
  <div class="sec-hd" style="margin-top:4px">What to sketch</div>
  <div class="cat-grid">
    ${CATS.map(c=>`
      <div class="cat-tile${setupCat===c.id?' sel':''}" onclick="selCat('${c.id}')"
        style="${setupCat===c.id?`border-color:${c.color};background:${c.bg}`:''}">
        <div style="color:${setupCat===c.id?c.color:'var(--text3)'}">${c.svg}</div>
        <div class="ct-name" style="${setupCat===c.id?`color:${c.color}`:''}">
          ${c.label}</div>
        <div class="ct-count">${OBJ[c.id].length} subjects</div>
      </div>`).join('')}
  </div>

  <div class="sec-hd">Time per object</div>
  <div class="time-chips">
    ${TIMES.map(t=>`<div class="tc${setupSecs===t.s?' on':''}" onclick="selTime(${t.s})">${t.l}</div>`).join('')}
  </div>

  <button class="btn-primary" onclick="startSession('${setupCat}',${setupSecs})">Let's sketch</button>`;
}
function selCat(id){setupCat=id;render();}
function selTime(s){setupSecs=s;render();}

// ── SESSION ──
function renderSession(){
  const s=ST.session;if(!s)return;
  const mc=document.getElementById('mainContent');
  const m=Math.floor(s.remaining/60),sec=s.remaining%60;
  const tStr=`${m}:${String(sec).padStart(2,'0')}`;
  const circ=2*Math.PI*36;
  const off=(circ*(1-s.remaining/s.secs)).toFixed(1);
  const timeUp=s.remaining===0&&!s.done;
  const cat=CATS.find(c=>c.id===s.catId);
  const tCol=s.remaining<=10&&s.remaining>0?'#FF8894':'var(--text)';

  mc.innerHTML=`
  <div class="subject-card" style="background:${cat.color}">
    <div class="sc-eyebrow">Your subject</div>
    <div class="sc-name pop-in">${s.current.n}</div>
    <span class="sc-cat">${s.current.c}</span>
  </div>

  <div class="sess-mid">
    <img src="${timeUp?P.clock:P.draw}" class="sess-penne" alt="Penne"/>
    <div class="timer-box">
      <div class="timer-wrap">
        <svg width="88" height="88" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="36" fill="none" stroke="var(--border2)" stroke-width="5"/>
          <circle id="tR" cx="40" cy="40" r="36" fill="none"
            stroke="${cat.color}" stroke-width="5" stroke-linecap="round"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off}"
            transform="rotate(-90 40 40)" style="transition:stroke-dashoffset .9s linear"/>
        </svg>
        <div class="timer-center">
          <div class="timer-num" id="tN" style="color:${tCol}">
            <span id="tD">${timeUp?'Done!':tStr}</span>
          </div>
          <div class="timer-sub">${timeUp?'tap sketched':s.running?'left':'tap ▶'}</div>
        </div>
      </div>
    </div>
  </div>

  <div class="count-row">
    <div class="count-card">
      <div class="cv" style="color:#FF8894">${ST.todaySketched}</div>
      <div class="cl">today</div>
    </div>
    <div class="count-card">
      <div class="cv" style="color:#5CC2C6">${Math.max(0,3-ST.todaySketched)}</div>
      <div class="cl">for streak</div>
    </div>
    <div class="count-card">
      <div class="cv" style="color:#C387C2">${s.sketched}</div>
      <div class="cl">session</div>
    </div>
  </div>

  <div class="sess-btns">
    <button class="btn-secondary" onclick="skipObj()">Skip</button>
    <button class="btn-primary" style="margin-bottom:0;flex:1" onclick="markSketched()">✓ Sketched</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
    ${s.running
      ?`<button class="btn-ghost" onclick="pauseTimer()">⏸ Pause</button>`
      :`<button class="btn-ghost" onclick="startTimer()">▶ ${s.remaining===s.secs?'Start':'Resume'}</button>`
    }
    <button class="btn-ghost" onclick="endSession()">End session</button>
  </div>`;
}

// ── END ──
function renderEnd(){
  const s=ST.session;if(!s)return'';
  const cat=CATS.find(c=>c.id===s.catId);
  const kept=ST.todaySketched>=3;
  const drawn=s.log.filter(l=>!l.skip);
  return `
  <div class="end-screen">
    <img src="${kept?P.excited:P.thumbs}" class="end-penne" alt="Penne"/>
    <div class="end-title">${kept?'Great work today!':'Good effort!'}</div>
    <div class="end-sub">${s.sketched} object${s.sketched!==1?'s':''} sketched</div>
    ${kept
      ?`<div class="streak-badge">🔥 Streak kept — ${ST.streak} day${ST.streak!==1?'s':''}!</div>`
      :ST.todaySketched>0
        ?`<div class="streak-badge" style="background:var(--bg2);color:var(--text2)">${ST.todaySketched}/3 today · ${3-ST.todaySketched} more to keep streak</div>`
        :''
    }
    <div class="end-stats">
      <div class="end-stat" style="background:#FFF0F3;border-color:rgba(255,136,148,0.18)">
        <div class="esv" style="color:#FF8894">${s.sketched}</div><div class="esl">sketched</div>
      </div>
      <div class="end-stat" style="background:#EDF7F7;border-color:rgba(92,194,198,0.18)">
        <div class="esv" style="color:#3AACAC">${fmt(s.secs)}</div><div class="esl">per object</div>
      </div>
      <div class="end-stat" style="background:${cat.bg.replace('0.1','0.15')};border-color:${cat.color}33">
        <div class="esv" style="color:${cat.color};font-size:13px">${cat.label}</div>
        <div class="esl">category</div>
      </div>
    </div>
    ${drawn.length>0?`
    <div class="drew-box">
      <div class="drew-lbl">you sketched</div>
      <div class="drew-chips">
        ${drawn.slice(0,8).map(d=>`<div class="dc">${d.name}</div>`).join('')}
        ${drawn.length>8?`<div class="dc" style="color:var(--text3)">+${drawn.length-8}</div>`:''}
      </div>
    </div>`:''}
    <button class="btn-primary" onclick="go('practice')">Practice again</button>
    <button class="btn-ghost" style="margin-top:0" onclick="go('home')">Back to home</button>
  </div>`;
}

// ── STATS ──
function renderStats(){
  const recent=ST.history.slice(0,12);
  const topCat=CATS.map(c=>({
    ...c,n:ST.history.filter(h=>!h.skip&&OBJ[c.id]?.some(o=>o.n===h.name)).length
  })).sort((a,b)=>b.n-a.n)[0];

  return `
  <div class="streak-band" style="margin-bottom:16px">
    <div class="sb-left">
      <div class="sb-eyebrow">current streak</div>
      <div class="sb-num">${ST.streak}<span class="sb-fire">🔥</span></div>
      <div class="sb-sub">best: ${ST.best} days</div>
    </div>
    <img src="${P.excited}" class="sb-penne" alt="Penne excited"/>
  </div>

  <div class="stat-grid" style="margin-bottom:16px">
    <div class="stat-card" style="background:#FFF0F3;border-color:rgba(255,136,148,0.18)">
      <div class="stat-val" style="color:#FF8894">${ST.totalSketched}</div>
      <div class="stat-lbl">total objects sketched</div>
    </div>
    <div class="stat-card" style="background:#EDF7F7;border-color:rgba(92,194,198,0.18)">
      <div class="stat-val" style="color:#3AACAC">${ST.todaySketched}</div>
      <div class="stat-lbl">sketched today</div>
    </div>
    <div class="stat-card" style="background:#F8EFF8;border-color:rgba(195,135,194,0.18)">
      <div class="stat-val" style="color:#C387C2">${ST.sessionDays}</div>
      <div class="stat-lbl">days practiced</div>
    </div>
    <div class="stat-card" style="background:#EDF4FC;border-color:rgba(94,168,230,0.18)">
      <div class="stat-val" style="color:#5EA8E6;font-size:18px">${topCat&&topCat.n>0?topCat.label:'—'}</div>
      <div class="stat-lbl">top category</div>
    </div>
  </div>

  <div class="sec-hd">By category</div>
  ${CATS.map(c=>{
    const n=ST.history.filter(h=>!h.skip&&OBJ[c.id]?.some(o=>o.n===h.name)).length;
    const pct=ST.totalSketched>0?Math.round((n/ST.totalSketched)*100):0;
    return `<div class="cat-bar-row">
      <div class="cat-bar-icon" style="color:${c.color}">${c.svg}</div>
      <div class="cat-bar-lbl">${c.label}</div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;background:${c.color}"></div></div>
      <div class="cat-bar-n">${n}</div>
    </div>`;
  }).join('')}

  <div class="sec-hd" style="margin-top:20px">Recent sketches</div>
  ${recent.length===0
    ?`<div style="text-align:center;padding:32px 16px;color:var(--text3);font-size:14px;line-height:1.6">Nothing yet —<br>start sketching!</div>`
    :recent.map(h=>`
      <div class="hist-row">
        <div class="hist-dot" style="background:${h.skip?'var(--border2)':'var(--accent)'}"></div>
        <div class="hist-name">${h.name}</div>
        <div class="hist-cat">${h.cat}</div>
        <div class="hist-st ${h.skip?'':'ok'}">${h.skip?'skipped':'✓ sketched'}</div>
      </div>`).join('')
  }`;
}

// ── INIT ──
load();
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
